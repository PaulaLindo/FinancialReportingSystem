[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    unit: Unit tests for individual components
    integration: Integration tests for system components
    ui: UI tests requiring Selenium WebDriver
    slow: Tests that take more than 10 seconds
    rbac: Tests related to role-based access control
    formula: Tests related to formula transparency feature
    modal: Tests related to modal functionality
    api: Tests for API endpoints
    accessibility: Tests for accessibility compliance
    responsive: Tests for responsive design
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
